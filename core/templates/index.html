<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Query Dashboard</title>
</head>

<body>
    <h1> Query History </h1>
    {% for query in queries %}
    <div>
        <h2> {{ query.question }} </h2>
        <p> {{ query.answer }} </p>
        <small> Asked on: {{ query.created_at }} </small>
        <form method="post" action="/">
            {% csrf_token %}
            <input type="hidden" name="delete_query_id" value="{{ query.id }}">
            <button class="btn btn-primary mt-2">Delete</button>
        </form>
    </div>
    {% endfor %}
</body>

</html>
